set -g prefix `
set -g mouse on

# General status bar settings
set -g status-position bottom
set -g status-bg black
set -g status-fg white
set -g status-left ''

# Right side: Date and Time
# We use white background with black text for a "block" effect, or vice versa
set -g status-right '#[fg=black,bg=white,bold] %d/%m #[fg=white,bg=colour0,bold] %H:%M:%S#[default]'
set -g status-right-length 50
set -g status-left-length 20
setw -g mode-keys vi

# Window status: Current/Active window (White text on black, or highlighted)
setw -g window-status-current-format '#[fg=black,bg=white] #I:#W#F '

# Window status: Inactive windows (Grey text on black)
setw -g window-status-format '#[fg=colour245,bg=black] #I:#W#F '

set-option -g history-limit 5000
run-shell ~/clone/path/resurrect.tmux
run-shell ~/clone/path/continuum.tmux

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
